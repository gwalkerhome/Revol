<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Revol — My Topics</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Space+Mono:wght@700&display=swap" rel="stylesheet" />
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0f0f1a;
  color: #f0f0ff;
  font-family: 'Nunito', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(107,203,119,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(107,203,119,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  animation: gridMove 20s linear infinite;
  pointer-events: none;
  z-index: 0;
}

@keyframes gridMove {
  0% { transform: translateY(0); }
  100% { transform: translateY(40px); }
}

.blob {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.15;
  pointer-events: none;
  z-index: 0;
  animation: blobFloat 8s ease-in-out infinite alternate;
}

.blob1 { width: 400px; height: 400px; background: #6bcb77; top: -100px; right: -100px; }
.blob2 { width: 300px; height: 300px; background: #4d96ff; bottom: -80px; left: -80px; animation-delay: -4s; }

@keyframes blobFloat {
  0% { transform: translate(0,0) scale(1); }
  100% { transform: translate(20px, 20px) scale(1.08); }
}

.wrapper {
  position: relative;
  z-index: 1;
  max-width: 960px;
  margin: 0 auto;
  padding: 40px 24px 80px;
}

header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 48px;
}

.logo {
  font-family: 'Space Mono', monospace;
  font-size: 1.6rem;
  font-weight: 700;
  background: linear-gradient(135deg, #4d96ff, #ff6b6b);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-decoration: none;
}

.logo span {
  display: inline-block;
  width: 8px;
  height: 8px;
  background: #ffd93d;
  border-radius: 50%;
  margin-left: 3px;
  vertical-align: middle;
  animation: pulse 1.5s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.4); opacity: 0.7; }
}

.back-btn {
  font-size: 0.85rem;
  color: #888aaa;
  text-decoration: none;
  transition: color 0.2s;
}

.back-btn:hover { color: #f0f0ff; }

.page-title { margin-bottom: 40px; }

.page-title h1 {
  font-size: 2rem;
  font-weight: 900;
  margin-bottom: 8px;
}

.page-title h1 span { color: #6bcb77; }
.page-title p { color: #888aaa; font-size: 0.95rem; }

.empty-state {
  text-align: center;
  padding: 80px 32px;
  color: #888aaa;
  display: none;
}

.empty-state.visible { display: block; }
.empty-state .icon { font-size: 3rem; margin-bottom: 16px; }
.empty-state h2 { font-size: 1.2rem; font-weight: 900; margin-bottom: 8px; color: #f0f0ff; }
.empty-state p { margin-bottom: 24px; }

.btn-new {
  display: inline-block;
  padding: 14px 32px;
  border-radius: 50px;
  border: none;
  background: linear-gradient(135deg, #6bcb77, #4d96ff);
  color: white;
  font-family: 'Nunito', sans-serif;
  font-weight: 900;
  font-size: 1rem;
  cursor: pointer;
  text-decoration: none;
  transition: transform 0.15s;
}

.btn-new:hover { transform: scale(1.05); }

.loading {
  text-align: center;
  padding: 60px;
  color: #888aaa;
}

.topics-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 24px;
}

.topic-card {
  background: #1a1a2e;
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 20px;
  overflow: hidden;
  transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
  cursor: pointer;
  position: relative;
}

.topic-card:hover {
  transform: translateY(-4px);
  border-color: rgba(107,203,119,0.3);
  box-shadow: 0 16px 40px rgba(0,0,0,0.3);
}

.topic-thumbnail {
  width: 100%;
  height: 160px;
  object-fit: cover;
  object-position: top;
  background: #0f0f1a;
  display: block;
}

.topic-thumbnail-placeholder {
  width: 100%;
  height: 160px;
  background: linear-gradient(135deg, #1a1a2e, #0f0f1a);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 3rem;
}

.topic-body { padding: 20px; }

.topic-name {
  font-size: 1rem;
  font-weight: 900;
  margin-bottom: 6px;
  line-height: 1.3;
}

.topic-date {
  font-size: 0.78rem;
  color: #888aaa;
  margin-bottom: 16px;
}

.topic-stats {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}

.stat-badge {
  font-size: 0.75rem;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 20px;
}

.stat-badge.quizzes {
  background: rgba(77,150,255,0.12);
  color: #4d96ff;
}

.stat-badge.score {
  background: rgba(107,203,119,0.12);
  color: #6bcb77;
}

.stat-badge.no-quizzes {
  background: rgba(255,255,255,0.05);
  color: #888aaa;
}

.topic-actions {
  display: flex;
  gap: 8px;
}

.btn-quiz {
  flex: 1;
  padding: 10px;
  border-radius: 50px;
  border: none;
  background: linear-gradient(135deg, #ffd93d, #ff6b6b);
  color: #0f0f1a;
  font-family: 'Nunito', sans-serif;
  font-weight: 900;
  font-size: 0.85rem;
  cursor: pointer;
  transition: transform 0.15s;
  text-align: center;
}

.btn-quiz:hover { transform: scale(1.05); }

.btn-view {
  padding: 10px 16px;
  border-radius: 50px;
  border: 1px solid rgba(255,255,255,0.1);
  background: transparent;
  color: #888aaa;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 0.85rem;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
}

.btn-view:hover { border-color: #6bcb77; color: #6bcb77; }

.btn-delete {
  padding: 10px 14px;
  border-radius: 50px;
  border: 1px solid rgba(255,107,107,0.2);
  background: transparent;
  color: #ff6b6b;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 0.85rem;
  cursor: pointer;
  transition: background 0.2s;
}

.btn-delete:hover { background: rgba(255,107,107,0.1); }

/* Topic viewer modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 100;
  display: none;
  align-items: flex-start;
  justify-content: center;
  padding: 40px 24px;
  overflow-y: auto;
}

.modal-overlay.visible { display: flex; }

.modal {
  background: #1a1a2e;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 24px;
  padding: 32px;
  max-width: 760px;
  width: 100%;
  position: relative;
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
  gap: 12px;
}

.modal-title { font-size: 1.2rem; font-weight: 900; color: #6bcb77; }

.btn-close {
  padding: 8px 16px;
  border-radius: 50px;
  border: 1px solid rgba(255,255,255,0.1);
  background: transparent;
  color: #888aaa;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 0.85rem;
  cursor: pointer;
}

.modal-content {
  color: #f0f0ff;
  font-size: 0.95rem;
  line-height: 1.8;
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 60vh;
  overflow-y: auto;
}

  </style>
</head>
<body>
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>

  <div class="wrapper">
    <header>
      <a href="index.html" class="logo">Revol<span></span></a>
      <a href="index.html" class="back-btn">&#8592; Back to home</a>
    </header>

<div class="page-title">
  <h1>📚 My <span>Topics</span></h1>
  <p>Your saved revision topics. Pick one to quiz yourself or read through your translation.</p>
</div>

<div class="loading" id="loading">Loading your topics...</div>

<div class="empty-state" id="empty-state">
  <div class="icon">📭</div>
  <h2>No topics yet</h2>
  <p>Translate a document to get started — it will be saved here automatically.</p>
  <a href="translate.html" class="btn-new">Translate a document</a>
</div>

<div class="topics-grid" id="topics-grid"></div>

  </div>

  <!-- Viewer modal -->

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="modal-title"></div>
        <button class="btn-close" onclick="closeModal()">Close</button>
      </div>
      <div class="modal-content" id="modal-content"></div>
    </div>
  </div>

  <script>
    firebase.initializeApp(firebaseConfig);
    var db = firebase.database();

    var topics = {};

    function formatDate(iso) {
      var d = new Date(iso);
      return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function getBestScore(quizHistory) {
      if (!quizHistory || !quizHistory.length) return null;
      var best = 0;
      quizHistory.forEach(function(q) {
        if (q.score > best) best = q.score;
      });
      return best;
    }

    function getLastScore(quizHistory) {
      if (!quizHistory || !quizHistory.length) return null;
      return quizHistory[quizHistory.length - 1].score;
    }

    function renderTopics() {
      var grid = document.getElementById('topics-grid');
      grid.innerHTML = '';
      var keys = Object.keys(topics);

      if (!keys.length) {
        document.getElementById('empty-state').className = 'empty-state visible';
        return;
      }

      document.getElementById('empty-state').className = 'empty-state';

      keys.sort(function(a, b) {
        return new Date(topics[b].date) - new Date(topics[a].date);
      });

      keys.forEach(function(key) {
        var t = topics[key];
        var quizHistory = t.quizHistory ? Object.values(t.quizHistory) : [];
        var lastScore = getLastScore(quizHistory);
        var card = document.createElement('div');
        card.className = 'topic-card';

        var thumbHtml = t.thumbnail
          ? '<img class="topic-thumbnail" src="data:image/jpeg;base64,' + t.thumbnail + '" alt="thumbnail">'
          : '<div class="topic-thumbnail-placeholder">📄</div>';

        var statsHtml = '';
        if (quizHistory.length) {
          statsHtml += '<span class="stat-badge quizzes">' + quizHistory.length + ' quiz' + (quizHistory.length > 1 ? 'zes' : '') + '</span>';
          if (lastScore !== null) {
            statsHtml += '<span class="stat-badge score">Last: ' + lastScore.correct + '/' + lastScore.total + '</span>';
          }
        } else {
          statsHtml = '<span class="stat-badge no-quizzes">No quizzes yet</span>';
        }

        card.innerHTML = thumbHtml +
          '<div class="topic-body">' +
            '<div class="topic-name">' + t.name + '</div>' +
            '<div class="topic-date">' + formatDate(t.date) + '</div>' +
            '<div class="topic-stats">' + statsHtml + '</div>' +
            '<div class="topic-actions">' +
              '<button class="btn-quiz" onclick="goToQuiz(\'' + key + '\')">&#9889; Quiz Me</button>' +
              '<button class="btn-view" onclick="viewTopic(\'' + key + '\')">View</button>' +
              '<button class="btn-delete" onclick="deleteTopic(\'' + key + '\')">&#10005;</button>' +
            '</div>' +
          '</div>';

        grid.appendChild(card);
      });
    }

    function goToQuiz(key) {
      localStorage.setItem('revol_quiz_topic_key', key);
      localStorage.setItem('revol_quiz_topic', JSON.stringify(topics[key]));
      window.location.href = 'quiz.html';
    }

    function viewTopic(key) {
      var t = topics[key];
      document.getElementById('modal-title').textContent = t.name;
      document.getElementById('modal-content').textContent = t.translation;
      document.getElementById('modal-overlay').className = 'modal-overlay visible';
    }

    function closeModal() {
      document.getElementById('modal-overlay').className = 'modal-overlay';
    }

    function deleteTopic(key) {
      if (!confirm('Delete "' + topics[key].name + '"? This cannot be undone.')) return;
      db.ref('topics/' + key).remove().then(function() {
        delete topics[key];
        renderTopics();
      });
    }

    db.ref('topics').on('value', function(snapshot) {
      document.getElementById('loading').style.display = 'none';
      topics = snapshot.val() || {};
      renderTopics();
    });
  </script>

</body>
</html>
