<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    firebase.initializeApp(firebaseConfig);
    var db = firebase.database();

    var allTranslations = [];
    var allPageImages = []; 
    var thumbnailBase64 = '';
    var savedTopicKey = null;

    window.onload = function() {
      var key = localStorage.getItem('openai_key');
      if (!key) {
        document.getElementById('no-key-warning').style.display = 'block';
      }
    };

    function setProgress(label, percent) {
      document.getElementById('progress-panel').className = 'progress-panel visible';
      document.getElementById('progress-label').textContent = label;
      document.getElementById('progress-bar').style.width = percent + '%';
    }

    function showError(msg) {
      var el = document.getElementById('error-panel');
      el.textContent = msg;
      el.className = 'error-panel visible';
    }

    function hideError() {
      document.getElementById('error-panel').className = 'error-panel';
    }

    function pageToBase64(page, scale) {
      return new Promise(function(resolve) {
        var viewport = page.getViewport({ scale: scale || 2 });
        var canvas = document.createElement('canvas');
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        var ctx = canvas.getContext('2d');
        page.render({ canvasContext: ctx, viewport: viewport }).promise.then(function() {
          resolve(canvas.toDataURL('image/jpeg', 0.85).split(',')[1]);
        });
      });
    }

    // --- TRANSLATION LOGIC (OpenAI) ---
    async function translatePage(base64Image, pageNum, totalPages, apiKey) {
      var response = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
        body: JSON.stringify({
          model: 'gpt-4o',
          messages: [
            { role: 'system', content: 'Translate all text in the image into English. Return plain text only.' },
            { role: 'user', content: [
                { type: 'image_url', image_url: { url: 'data:image/jpeg;base64,' + base64Image } },
                { type: 'text', text: 'Translate this page.' }
            ]}
          ]
        })
      });
      var data = await response.json();
      return data.choices[0].message.content;
    }

    // --- RECREATION LOGIC (Gemini) ---
    async function makeEnglishPDF() {
      if (!allPageImages.length) { alert('No pages to convert yet.'); return; }

      var geminiKey = localStorage.getItem('gemini_key');
      if (!geminiKey) { alert('Please add your Gemini API Key in settings.'); return; }

      var btn = document.getElementById('btn-pdf');
      btn.disabled = true;
      btn.textContent = 'Generating Layout...';

      try {
        // We will combine all pages into one visual output
        let combinedHtml = "<html><head><style>body{font-family:sans-serif; background:#f0f0f0; padding:20px;} .page-break{page-break-after:always; margin-bottom:40px; border-bottom:2px solid #ccc;}</style></head><body>";

        for (var i = 0; i < allPageImages.length; i++) {
          setProgress(`Reconstructing Page ${i+1} layout...`, 50);

          const response = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${geminiKey}`,
            {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                contents: [{
                  parts: [
                    { inline_data: { mime_type: 'image/jpeg', data: allPageImages[i] } },
                    { text: "You are an expert web developer. Recreate this document page as a single-file HTML/CSS component. 1. Translate all text to English. 2. Use CSS Flexbox/Grid to match the layout exactly. 3. Use CSS/SVG to recreate any diagrams or icons. 4. Return ONLY the HTML code inside a ```html block. Do not use external images." }
                  ]
                }]
              })
            }
          );

          const data = await response.json();
          if (data.error) throw new Error(data.error.message);

          // Extract HTML from the markdown response
          let rawText = data.candidates[0].content.parts[0].text;
          let htmlContent = rawText.replace(/```html|```/g, "").trim();
          
          combinedHtml += `<div class="page-break">${htmlContent}</div>`;
        }

        combinedHtml += "</body></html>";

        // Open in new window
        var printWindow = window.open('', '_blank');
        printWindow.document.write(combinedHtml);
        printWindow.document.close();

      } catch (err) {
        alert('Layout generation failed: ' + err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Make English PDF';
        setProgress('Done', 100);
      }
    }

    // --- FILE HANDLING & UTILS ---
    async function handleFile(event) {
      var file = event.target.files[0];
      if (!file) return;
      var key = localStorage.getItem('openai_key');
      if (!key) { showError('No OpenAI key found.'); return; }

      hideError();
      allTranslations = [];
      allPageImages = [];
      setProgress('Processing PDF...', 10);

      try {
        var arrayBuffer = await file.arrayBuffer();
        var pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        document.getElementById('result-panel').className = 'result-panel visible';

        for (var i = 1; i <= pdf.numPages; i++) {
          var page = await pdf.getPage(i);
          var base64 = await pageToBase64(page, 2);
          allPageImages.push(base64);

          var translation = await translatePage(base64, i, pdf.numPages, key);
          allTranslations.push(translation);
          document.getElementById('result-content').innerHTML += `<h3>Page ${i}</h3><p>${translation}</p><hr>`;
        }
        setProgress('Ready to recreate!', 100);
      } catch (err) {
        showError(err.message);
      }
    }

</script>
